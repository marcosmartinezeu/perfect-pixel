services:
  postgres:
    image: postgres:17
    container_name: image-optimizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: image_optimizer
      POSTGRES_USER: image_optimizer
      POSTGRES_PASSWORD: image_optimizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: image-optimizer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

